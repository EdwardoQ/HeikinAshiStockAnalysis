<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edward's Stock Tracker</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { 
            font-family: sans-serif; background-color: #121212; color: white; 
            margin: 0; padding: 20px; height: 100vh; box-sizing: border-box;
            display: flex; flex-direction: column;
        }
        h2 { margin-top: 0; margin-bottom: 10px; color: #26a69a; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #2b2b43; padding-bottom: 10px; }
        .tab-btn { background: none; color: #d1d4dc; border: none; font-size: 16px; cursor: pointer; padding: 10px 20px; border-radius: 4px; transition: background 0.2s; }
        .tab-btn:hover { background-color: #1e1e1e; }
        .tab-btn.active { background-color: #2b2b43; color: white; font-weight: bold; }
        .tab-content { display: none; flex-direction: column; flex-grow: 1; }
        .tab-content.active { display: flex; }

        .controls { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; margin-bottom: 15px; }
        input, select { padding: 10px; font-size: 14px; border: 1px solid #2b2b43; background-color: #121212; color: white; border-radius: 4px; }
        input { text-transform: uppercase; }
        button.action-btn { padding: 10px 15px; font-size: 14px; background-color: #26a69a; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button.action-btn:hover { background-color: #2bbbb0; }
        
        #info-bar { background-color: #1e1e1e; border: 1px solid #2b2b43; padding: 10px 12px; border-radius: 4px; margin-bottom: 15px; font-family: monospace; font-size: 14px; display: flex; flex-wrap: wrap; align-items: center; gap: 20px; color: #d1d4dc; }
        .info-value { font-weight: bold; }
        .text-green { color: #26a69a; } .text-red { color: #ef5350; }
        
        .mtf-matrix { margin-left: auto; display: flex; gap: 15px; background-color: #121212; padding: 4px 10px; border-radius: 4px; border: 1px solid #2b2b43; }
        
        #chart-container { width: 100%; flex-grow: 1; position: relative; }

        .list-container { width: 100%; background-color: #1e1e1e; border: 1px solid #2b2b43; border-radius: 4px; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .watchlist-input-group { display: flex; gap: 10px; margin-bottom: 20px; max-width: 400px; }
        .watchlist-input-group input { flex-grow: 1; }
        
        .stock-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .stock-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background-color: #121212; border-radius: 6px; border: 1px solid #2b2b43; cursor: pointer; transition: border-color 0.2s, background-color 0.2s; width: 100%; box-sizing: border-box; }
        .stock-item:hover { background-color: #1a1a24; border-color: #434651; }
        
        .wl-left { display: flex; align-items: center; gap: 15px; }
        .wl-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #2b2b43, #1e1e1e); border: 1px solid #434651; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: #d1d4dc; }
        .wl-ticker-info { display: flex; flex-direction: column; gap: 6px; }
        .wl-ticker-name { font-size: 16px; font-weight: bold; }
        
        /* NEW: Watchlist MTF Matrix Styles */
        .wl-mtf { display: flex; gap: 8px; font-size: 11px; background-color: #1e1e1e; padding: 4px 8px; border-radius: 4px; border: 1px solid #2b2b43; width: fit-content; }
        
        .ha-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; width: fit-content; }
        .ha-badge.up { background-color: rgba(38, 166, 154, 0.15); color: #26a69a; border: 1px solid rgba(38, 166, 154, 0.3); }
        .ha-badge.down { background-color: rgba(239, 83, 80, 0.15); color: #ef5350; border: 1px solid rgba(239, 83, 80, 0.3); }
        .ha-badge.neutral { background-color: rgba(209, 212, 220, 0.15); color: #d1d4dc; border: 1px solid rgba(209, 212, 220, 0.3); }

        .wl-right { display: flex; align-items: center; gap: 20px; }
        .wl-price-info { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
        .wl-price { font-size: 16px; font-weight: bold; }
        .wl-change { font-size: 13px; }
        
        .delete-btn { background: none; color: #ef5350; border: none; cursor: pointer; font-size: 20px; padding: 5px; opacity: 0.6; transition: opacity 0.2s; }
        .delete-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <h2>Edward's Stock Tracker (10-15 minute delay)</h2>
    
    <div class="tabs">
        <button class="tab-btn active" data-target="chart-view">Chart</button>
        <button class="tab-btn" data-target="watchlist-view">Watchlist</button>
        <button class="tab-btn" data-target="screener-view">HA Screener</button>
    </div>

    <div id="chart-view" class="tab-content active">
        <div class="controls">
            <div><label>Ticker: </label><input type="text" id="stock-input" placeholder="e.g. GOTO" value="" style="width: 100px;"></div>
            <div><label>Style: </label><select id="chart-type"><option value="heikin-ashi">Heikin Ashi</option><option value="normal">Normal</option></select></div>
            <div>
                <label>Timeframe: </label>
                <select id="timeframe-select">
                    <option value="1d|5y">1 Day (5 Years)</option><option value="1h|2y">1 Hour (2 Years)</option>
                    <option value="15m|60d">15 Min (60 Days)</option><option value="5m|60d">5 Min (60 Days)</option>
                </select>
            </div>
            <button id="search-btn" class="action-btn">Load Chart</button>
        </div>

        <div id="info-bar">
            <div>Ticker: <span id="info-symbol" class="info-value">-</span></div>
            <div>Time: <span id="info-time" class="info-value">-</span></div>
            <div>O: <span id="info-open" class="info-value">-</span></div>
            <div>H: <span id="info-high" class="info-value">-</span></div>
            <div>L: <span id="info-low" class="info-value">-</span></div>
            <div>C: <span id="info-close" class="info-value">-</span></div>
            <div>V: <span id="info-volume" class="info-value">-</span></div>
            
            <div class="mtf-matrix">
                <span>MTF Trend:</span>
                <span id="mtf-w" title="Weekly HA">W: -</span>
                <span id="mtf-d" title="Daily HA">D: -</span>
                <span id="mtf-h" title="Hourly HA">H: -</span>
            </div>
        </div>
        
        <div id="chart-container"></div>
    </div>

    <div id="watchlist-view" class="tab-content">
        <div class="list-container">
            <p style="margin-top: 0; color: #d1d4dc;">Monitor your favorite stocks. Click anywhere on a card to load its detailed chart.</p>
            <div class="watchlist-input-group">
                <input type="text" id="new-watchlist-item" placeholder="Type ticker (e.g., GOTO)">
                <button id="add-watchlist-btn" class="action-btn">Add to List</button>
            </div>
            <ul id="watchlist-ul" class="stock-list"></ul>
        </div>
    </div>

    <div id="screener-view" class="tab-content">
        <div class="list-container">
            <p style="margin-top: 0; color: #d1d4dc;">Find powerful trend reversals.</p>
            <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 15px;">
                <select id="screener-strategy">
                    <option value="reversal">Scan: Strong Bullish Reversal</option>
                    <option value="doji">Scan: Bottom Indecision (Doji)</option>
                </select>
                <button id="run-screener-btn" class="action-btn" style="background-color: #2962FF;">Run Screener</button>
                <span id="screener-status" style="font-size: 14px; color: #888;">Ready to scan.</span>
            </div>
            <ul id="screener-ul" class="stock-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
